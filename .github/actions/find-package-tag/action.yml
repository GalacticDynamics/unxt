name: Find package tag
description:
  Find the single package tag pointing at a commit and export PACKAGE_TAG.

inputs:
  tag_glob:
    description: Tag glob pattern to match (for example unxt-v*).
    required: true
  commit_sha:
    description: Commit SHA to search tags for.
    required: true

outputs:
  package_tag:
    description: The resolved package tag.
    value: ${{ steps.find_tag.outputs.package_tag }}

runs:
  using: composite
  steps:
    - id: find_tag
      shell: bash
      run: |
        set -euo pipefail

        TAG_GLOB='${{ inputs.tag_glob }}'
        COMMIT_SHA='${{ inputs.commit_sha }}'

        # Fetch tags to locate package-specific tags created by upstream workflow.
        git fetch --tags

        TAGS=$(git tag --points-at "$COMMIT_SHA" --list "$TAG_GLOB" || true)

        if [ -z "$TAGS" ]; then
          echo "ERROR: No ${TAG_GLOB} tag found pointing at commit $COMMIT_SHA"
          exit 1
        fi

        TAG_COUNT=$(printf '%s\n' "$TAGS" | wc -l)

        if [ "$TAG_COUNT" -gt 1 ]; then
          echo "ERROR: Multiple ${TAG_GLOB} tags found pointing at commit $COMMIT_SHA:"
          echo "$TAGS"
          exit 1
        fi

        TAG=$(printf '%s\n' "$TAGS" | head -n 1)
        echo "Found package tag: $TAG (at commit $COMMIT_SHA)"

        # Export for later steps in this job.
        echo "PACKAGE_TAG=$TAG" >> "$GITHUB_ENV"
        echo "package_tag=$TAG" >> "$GITHUB_OUTPUT"
