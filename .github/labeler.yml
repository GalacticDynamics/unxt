# .github/labeler.yml
# Automatically apply labels based on file paths

"🙈 Add / update .gitignore":
  - changed-files:
      - any-glob-to-any-file: "**/.gitignore"

"👷 Add / update CI build system":
  - changed-files:
      - any-glob-to-any-file: ".github/workflows/**"

"🔧 Add / update configuration":
  - changed-files:
      - any-glob-to-any-file:
          - "pyproject.toml"
          - "noxfile.py"
          - ".github/labels.yml"
          - ".github/labeler.yml"
          - ".github/dependabot.yml"
          - ".github/release.yml"
          - "conftest.py"

"📝 Add / update documentation":
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "CONTRIBUTING.md"
          - "docs/**"

"📄 Add / update license":
  - changed-files:
      - any-glob-to-any-file: "LICENSE"

"✅ Add / update / pass tests":
  - changed-files:
      - any-glob-to-any-file: "tests/**"

"⏱️ Run benchmarks":
  - changed-files:
      - any-glob-to-any-file: "tests/benchmark/**"

"🧩 unxts-api":
  - changed-files:
      - any-glob-to-any-file:
          - "packages/unxts.api/**"
          - ".github/workflows/cd-unxts-api.yml"
          - ".github/workflows/cd-publish-unxts-api.yml"
          - ".github/workflows/cd-pr-unxts-api.yml"

"🧩 unxts-hypothesis":
  - changed-files:
      - any-glob-to-any-file:
          - "packages/unxts.hypothesis/**"
          - ".github/workflows/cd-unxts-hypothesis.yml"
          - ".github/workflows/cd-publish-unxts-hypothesis.yml"
          - ".github/workflows/cd-pr-unxts-hypothesis.yml"

"🧩 unxts-xarray":
  - changed-files:
      - any-glob-to-any-file:
          - "packages/unxts.xarray/**"
          - ".github/workflows/cd-unxts-xarray.yml"
          - ".github/workflows/cd-publish-unxts-xarray.yml"
          - ".github/workflows/cd-pr-unxts-xarray.yml"
