name: Auto-label PRs

on:
  workflow_run:
    workflows: ["Collect PR labels"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Discover PR label input artifact
        id: artifact
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const runId = context.payload.workflow_run.id;

            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              {
                owner,
                repo,
                run_id: runId,
                per_page: 100,
              }
            );

            const artifactNames = artifacts.map((artifact) => artifact.name);
            const matches = artifactNames.filter((name) =>
              /^pr-labeler-input-\d+$/.test(name)
            );

            if (matches.length !== 1) {
              core.setFailed(
                `Expected exactly 1 PR label input artifact on workflow_run ${runId}, got ${matches.length}. Matching artifacts: ${matches.length > 0 ? matches.join(", ") : "(none)"}. All artifacts: ${artifactNames.length > 0 ? artifactNames.join(", ") : "(none)"}.`
              );
              return;
            }

            core.setOutput("artifact_name", matches[0]);

      - name: Download PR label input artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: .

      - name: Validate artifact and extract PR number
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const payloadPath = "labeler-input.json";

            if (!fs.existsSync(payloadPath)) {
              core.setFailed("Missing labeler-input.json artifact.");
              return;
            }

            let payload;
            try {
              payload = JSON.parse(fs.readFileSync(payloadPath, "utf8"));
            } catch (error) {
              core.setFailed(`Invalid labeler-input.json artifact: ${error.message}`);
              return;
            }

            const prNumber = Number(payload.pr_number);
            const headSha = payload.head_sha;
            const runSha = payload.run_sha;
            const workflowRun = context.payload.workflow_run;
            const runPRs = workflowRun.pull_requests ?? [];

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed("Invalid PR number in artifact.");
              return;
            }

            const runPR = runPRs.find((pr) => pr.number === prNumber);

            if (typeof runSha !== "string" || runSha.length === 0) {
              core.setFailed(
                `Invalid workflow run SHA in artifact: expected non-empty string, got ${typeof runSha}.`
              );
              return;
            }

            if (typeof headSha !== "string" || headSha.length === 0) {
              core.setFailed(
                `Invalid PR head SHA in artifact: expected non-empty string, got ${typeof headSha}.`
              );
              return;
            }

            if (runSha !== workflowRun.head_sha) {
              core.setFailed("Artifact workflow run SHA does not match workflow_run head SHA.");
              return;
            }

            if (!runPR) {
              const associatedPRs = await github.paginate(
                github.rest.repos.listPullRequestsAssociatedWithCommit,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: runSha,
                  per_page: 100,
                }
              );
              const hasAssociatedPR = associatedPRs.some((pr) => pr.number === prNumber);
              if (!hasAssociatedPR) {
                core.setFailed(
                  "PR number from artifact is not attached to workflow_run and is not associated with workflow_run head SHA."
                );
                return;
              }
              core.warning(
                "workflow_run pull_requests metadata did not include the PR; validated PR linkage via associated pull requests for workflow_run head SHA."
              );
            }

            if (runPR) {
              const runPRHeadSha = runPR.head?.sha;
              if (typeof runPRHeadSha === "string") {
                if (headSha !== runPRHeadSha) {
                  core.setFailed("Artifact PR head SHA does not match workflow_run pull_request head SHA.");
                  return;
                }
              } else {
                core.warning("workflow_run pull_request head SHA unavailable; skipped PR head SHA consistency check.");
              }
            }

            core.setOutput("pr_number", String(prNumber));

      - name: Apply path-based labels
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
          pr-number: ${{ steps.pr.outputs.pr_number }}
      - name: Label from commit emojis
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pull_number = Number(process.env.PR_NUMBER);
            if (!Number.isInteger(pull_number) || pull_number <= 0) {
              core.setFailed("Invalid PR number.");
              return;
            }

            // Get repository labels and build emoji-to-label map
            const repoLabels = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              }
            );

            const labelMap = {};
            for (const label of repoLabels) {
              // Extract the emoji from the label name (first character(s))
              const match = label.name.match(/^(\p{Emoji}[\u200d\ufe0f]*)/u);
              if (match) {
                const emoji = match[1];
                labelMap[emoji] = label.name;
              }
            }

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number,
                per_page: 100,
              }
            );

            const labelsToAdd = new Set();
            for (const commit of commits) {
              const message = commit.commit.message;
              // Check if message starts with an emoji
              for (const [emoji, label] of Object.entries(labelMap)) {
                if (message.startsWith(emoji)) {
                  labelsToAdd.add(label);
                  break;
                }
              }
            }

            if (labelsToAdd.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pull_number,
                labels: Array.from(labelsToAdd)
              });
            }
