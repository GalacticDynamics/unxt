name: Auto-label PRs

on:
  workflow_run:
    workflows: ["Collect PR labels"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.5.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Download PR label input artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: pr-labeler-input-*
          merge-multiple: true
          path: .

      - name: Validate artifact and extract PR number
        id: pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require("fs");
            const payloadPath = "labeler-input.json";

            if (!fs.existsSync(payloadPath)) {
              core.setFailed("Missing labeler-input.json artifact.");
              return;
            }

            let payload;
            try {
              payload = JSON.parse(fs.readFileSync(payloadPath, "utf8"));
            } catch (error) {
              core.setFailed(`Invalid labeler-input.json artifact: ${error.message}`);
              return;
            }

            const prNumber = Number(payload.pr_number);
            const headSha = payload.head_sha;
            const runSha = payload.run_sha;
            const workflowRun = context.payload.workflow_run;
            const runPRs = workflowRun.pull_requests ?? [];

            if (
              !Number.isFinite(prNumber) ||
              !Number.isInteger(prNumber) ||
              prNumber <= 0
            ) {
              core.setFailed("Invalid PR number in artifact.");
              return;
            }

            const runPR = runPRs.find((pr) => pr.number === prNumber);
            if (!runPR) {
              core.setFailed("PR number from artifact is not attached to workflow_run.");
              return;
            }

            if (typeof headSha !== "string" || headSha.length === 0) {
              core.setFailed(
                `Invalid PR head SHA in artifact: expected non-empty string, got ${typeof headSha}.`
              );
              return;
            }

            if (typeof runSha !== "string" || runSha.length === 0) {
              core.setFailed(
                `Invalid workflow run SHA in artifact: expected non-empty string, got ${typeof runSha}.`
              );
              return;
            }

            if (runSha !== workflowRun.head_sha) {
              core.setFailed("Artifact workflow run SHA does not match workflow_run head SHA.");
              return;
            }

            const runPRHeadSha = runPR.head?.sha;
            if (typeof runPRHeadSha === "string" && headSha !== runPRHeadSha) {
              core.setFailed("Artifact PR head SHA does not match workflow_run pull_request head SHA.");
              return;
            }

            core.setOutput("pr_number", String(prNumber));

      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
          pr-number: ${{ steps.pr.outputs.pr_number }}
      - name: Label from commit emojis
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pull_number = Number("${{ steps.pr.outputs.pr_number }}");
            if (!Number.isInteger(pull_number) || pull_number <= 0) {
              core.setFailed("Invalid PR number.");
              return;
            }

            // Get repository labels and build emoji-to-label map
            const repoLabels = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              }
            );

            const labelMap = {};
            for (const label of repoLabels) {
              // Extract the emoji from the label name (first character(s))
              const match = label.name.match(/^(\p{Emoji}[\u200d\ufe0f]*)/u);
              if (match) {
                const emoji = match[1];
                labelMap[emoji] = label.name;
              }
            }

            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
            });

            const labelsToAdd = new Set();
            for (const commit of commits) {
              const message = commit.commit.message;
              // Check if message starts with an emoji
              for (const [emoji, label] of Object.entries(labelMap)) {
                if (message.startsWith(emoji)) {
                  labelsToAdd.add(label);
                  break;
                }
              }
            }

            if (labelsToAdd.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pull_number,
                labels: Array.from(labelsToAdd)
              });
            }
