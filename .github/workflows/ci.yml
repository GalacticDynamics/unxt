name: CI

permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Weekly, Mondays at midnight UTC. This is the ecosystem check: the
    # per-package jobs below are gated off on ordinary PRs, so this run is what
    # exercises every sibling package against current upstream releases and
    # catches breakage that lands without any change to this repo.
    - cron: "0 0 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSIONS: '["3.11", "3.12", "3.13", "3.14"]'
  # Many color libraries just need this to be set to any value, but at least
  # one distinguishes color depth, where "3" -> "256-bit color".
  FORCE_COLOR: 3

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      python-versions: ${{ env.PYTHON_VERSIONS }}
      oldest-python: ${{ steps.versions.outputs.oldest }}
      newest-python: ${{ steps.versions.outputs.newest }}
    steps:
      - id: versions
        run: |
          versions='${{ env.PYTHON_VERSIONS }}'
          oldest=$(echo "$versions" | jq -r '.[0]')
          newest=$(echo "$versions" | jq -r '.[-1]')
          echo "oldest=$oldest" >> $GITHUB_OUTPUT
          echo "newest=$newest" >> $GITHUB_OUTPUT

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install
        run: uv sync --no-default-groups --group nox --group lint --locked

      - name: Lint
        run: uv run --frozen nox -s lint

  # Main package tests
  tests-unxt:
    name: unxt Python ${{ matrix.python-version }} on ${{ matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    needs: [setup, format]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
        runs-on: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          uv sync --no-default-groups --group nox --group test --locked --package unxt

      - name: Test package
        run: |
          uv run --frozen --package unxt nox -s "pytest(package='unxt')" -- --cov --cov-report=xml --cov-report=term --durations=20

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # unxt-api package tests
  tests-unxt-api:
    name: unxt-api Python ${{ matrix.python-version }} on ${{ matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    needs: [setup, format]
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, '🧩 unxt-api') ||
      startsWith(github.head_ref, 'unxt-api/')
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
        runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          uv sync --no-default-groups --group test --locked --package unxt-api

      - name: Test package
        run: |
          uv run --frozen --package unxt-api pytest packages/unxt-api/tests --cov=packages/unxt-api/src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # unxt-hypothesis package tests
  tests-unxt-hypothesis:
    name:
      unxt-hypothesis Python ${{ matrix.python-version }} on ${{ matrix.runs-on
      }}
    runs-on: ${{ matrix.runs-on }}
    needs: [setup, format]
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, '🧩 unxt-hypothesis') ||
      startsWith(github.head_ref, 'unxt-hypothesis/')
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
        runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          uv sync --no-default-groups --group test --locked --package unxt-hypothesis

      - name: Test package
        run: |
          uv run --frozen --package unxt-hypothesis pytest packages/unxt-hypothesis/tests --cov=packages/unxt-hypothesis/src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # unxts-api package tests
  tests-unxts-api:
    name: unxts-api Python ${{ matrix.python-version }} on ${{ matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    needs: [setup, format]
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, '🧩 unxts-api') ||
      startsWith(github.head_ref, 'unxts-api/')
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
        runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          uv sync --no-default-groups --group test --locked --package unxts-api

      - name: Test package
        run: |
          uv run --frozen --package unxts-api pytest packages/unxts.api/src
          uv run --frozen --package unxts-api pytest packages/unxts.api/tests --cov=packages/unxts.api/src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # unxts-hypothesis package tests
  tests-unxts-hypothesis:
    name:
      unxts-hypothesis Python ${{ matrix.python-version }} on ${{ matrix.runs-on
      }}
    runs-on: ${{ matrix.runs-on }}
    needs: [setup, format]
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, '🧩 unxts-hypothesis') ||
      startsWith(github.head_ref, 'unxts-hypothesis/')
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
        runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          uv sync --no-default-groups --group test --locked --package unxts-hypothesis

      - name: Test package
        run: |
          # src doctests: leaf dir `unxts/hypothesis` shadows the installed
          # `hypothesis`, so sybil mis-imports it. Run these via pytest's
          # namespace-aware --doctest-modules (doctest plugin re-enabled by
          # overriding addopts, which otherwise sets `-p no:doctest`).
          uv run --frozen --package unxts-hypothesis pytest packages/unxts.hypothesis/src --doctest-modules -o addopts="--import-mode=importlib" -o consider_namespace_packages=true -o doctest_optionflags="ELLIPSIS NORMALIZE_WHITESPACE"
          uv run --frozen --package unxts-hypothesis pytest packages/unxts.hypothesis/tests --cov=packages/unxts.hypothesis/src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # unxts-interop-gala package tests
  tests-unxts-interop-gala:
    name:
      unxts-interop-gala Python ${{ matrix.python-version }} on ${{
      matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    needs: [setup, format]
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, '🧩 unxts-interop-gala') ||
      startsWith(github.head_ref, 'unxts-interop-gala/')
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
        runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          uv sync --no-default-groups --group test --locked --package unxts-interop-gala

      - name: Test package
        run: |
          # src doctests: leaf dir `unxts/interop/gala` shadows the installed
          # `gala`, so sybil mis-imports it; use namespace-aware --doctest-modules.
          uv run --frozen --package unxts-interop-gala pytest packages/unxts.interop.gala/src --doctest-modules -o addopts="--import-mode=importlib" -o consider_namespace_packages=true -o doctest_optionflags="ELLIPSIS NORMALIZE_WHITESPACE"
          uv run --frozen --package unxts-interop-gala pytest packages/unxts.interop.gala/tests --cov=packages/unxts.interop.gala/src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # unxts-interop-matplotlib package tests
  tests-unxts-interop-matplotlib:
    name:
      unxts-interop-matplotlib Python ${{ matrix.python-version }} on ${{
      matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    needs: [setup, format]
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, '🧩 unxts-interop-matplotlib') ||
      startsWith(github.head_ref, 'unxts-interop-matplotlib/')
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
        runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          uv sync --no-default-groups --group test --locked --package unxts-interop-matplotlib

      - name: Test package
        run: |
          uv run --frozen --package unxts-interop-matplotlib pytest packages/unxts.interop.matplotlib/tests --cov=packages/unxts.interop.matplotlib/src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # unxts-interop-xarray package tests
  tests-unxts-interop-xarray:
    name:
      unxts-interop-xarray Python ${{ matrix.python-version }} on ${{
      matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    needs: [setup, format]
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, '🧩 unxts-interop-xarray') ||
      startsWith(github.head_ref, 'unxts-interop-xarray/')
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
        runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          uv sync --no-default-groups --group test --locked --package unxts-interop-xarray

      - name: Test package
        run: |
          # src doctests: leaf dir `unxts/interop/xarray` shadows the installed
          # `xarray`, so sybil mis-imports it; use namespace-aware --doctest-modules.
          uv run --frozen --package unxts-interop-xarray pytest packages/unxts.interop.xarray/src --doctest-modules -o addopts="--import-mode=importlib" -o consider_namespace_packages=true -o doctest_optionflags="ELLIPSIS NORMALIZE_WHITESPACE"
          uv run --frozen --package unxts-interop-xarray pytest packages/unxts.interop.xarray/tests --cov=packages/unxts.interop.xarray/src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # unxts-parametric package tests
  #
  # NB: the label clause below is weaker than it looks. The `🧩 unxts-parametric`
  # label is applied by the `Auto-label PRs` workflow, which runs on
  # `workflow_run` *after* `Collect PR labels` completes, while CI evaluates
  # `github.event.pull_request.labels` from the original `pull_request` payload.
  # The label therefore lands too late to gate the run it would need to gate,
  # and CI does not trigger on `types: [labeled]` -- so in practice it only
  # takes effect on the *next* push to the PR. Coverage for core changes that
  # break this package comes from the push-to-main and weekly `schedule` runs.
  tests-unxts-parametric:
    name:
      unxts-parametric Python ${{ matrix.python-version }} on ${{ matrix.runs-on
      }}
    runs-on: ${{ matrix.runs-on }}
    needs: [setup, format]
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, '🧩 unxts-parametric') ||
      startsWith(github.head_ref, 'unxts-parametric/')
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
        runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          uv sync --no-default-groups --group test --locked --package unxts-parametric

      - name: Test package
        run: |
          # src doctests and tests are collected in separate invocations: the
          # namespace package's leaf dir is imported under one name for src and
          # another for tests, so co-collecting them double-imports the module.
          uv run --frozen --package unxts-parametric pytest packages/unxts.parametric/src
          uv run --frozen --package unxts-parametric pytest packages/unxts.parametric/tests --cov=packages/unxts.parametric/src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # unxts-linalg package tests
  tests-unxts-linalg:
    name:
      unxts-linalg Python ${{ matrix.python-version }} on ${{ matrix.runs-on }}
    runs-on: ${{ matrix.runs-on }}
    needs: [setup, format]
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, '🧩 unxts-linalg') ||
      startsWith(github.head_ref, 'unxts-linalg/')
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
        runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          uv sync --no-default-groups --group test --locked --package unxts-linalg

      - name: Test package
        run: |
          # src doctests and tests are collected in separate invocations: the
          # namespace package's leaf dir is imported under one name for src and
          # another for tests, so co-collecting them double-imports the module.
          uv run --frozen --package unxts-linalg pytest packages/unxts.linalg/src
          uv run --frozen --package unxts-linalg pytest packages/unxts.linalg/tests --cov=packages/unxts.linalg/src --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test-oldest:
    name: Check Oldest Dependencies
    runs-on: ${{ matrix.runs-on }}
    needs: [setup, format]
    strategy:
      fail-fast: false
      matrix:
        # Wrap the scalar `oldest-python` (e.g. "3.11") in a single-element list:
        # a matrix axis must be a sequence, otherwise it never expands and the
        # job silently never runs (making the required `CI Pass` gate fail).
        # Quotes keep it a string so e.g. "3.10" isn't parsed as the float 3.1.
        python-version: ["${{ needs.setup.outputs.oldest-python }}"]
        runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test package
        run: |
          uv run --frozen --package unxt --extra all --group test-all --resolution lowest-direct pytest --cov --cov-report=xml --cov-report=term --durations=20 --mpl

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test-newest:
    name: Newest supported deps
    runs-on: ubuntu-latest
    needs: [setup, format]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ needs.setup.outputs.newest-python }}

      - name: Install the project
        run: uv sync --no-default-groups --extra all --group test-all --upgrade

      - name: Test package
        run: uv run --no-sync pytest

  test-interoperability:
    name: Check Interoperability
    runs-on: ${{ matrix.runs-on }}
    needs: [setup, format]
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
        runs-on: [ubuntu-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test package
        run: |
          uv run --frozen --package unxt --extra all --group test-all pytest --cov --cov-report=xml --cov-report=term --durations=20 --mpl

      - name: Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-24.04
    needs: [setup, format]
    if:
      github.event_name == 'workflow_dispatch' || (github.event_name ==
      'pull_request' && contains(github.event.pull_request.labels.*.name, '⏱️
      Run benchmarks')) || (github.event_name == 'push' && github.ref ==
      'refs/heads/main')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run benchmarks
        uses: CodSpeedHQ/action@a4a36bb07c0638b0b4ca52bf1f3dad1b4289e52f # v4.18.1
        with:
          token: ${{ secrets.CODSPEED_TOKEN }}
          mode: instrumentation
          run: uv run --group test pytest tests/benchmark --codspeed

  status:
    name: CI Pass
    runs-on: ubuntu-latest
    needs:
      [
        setup,
        format,
        tests-unxt,
        tests-unxt-api,
        tests-unxt-hypothesis,
        tests-unxts-api,
        tests-unxts-hypothesis,
        tests-unxts-interop-gala,
        tests-unxts-interop-matplotlib,
        tests-unxts-interop-xarray,
        tests-unxts-parametric,
        tests-unxts-linalg,
        test-oldest,
        test-newest,
        test-interoperability,
      ]
    if: always()
    steps:
      - name: All required jobs passed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          # These per-package jobs only run on push / schedule /
          # workflow_dispatch / a package label / `<pkg>/*` branches (see their
          # `if:`), so on a normal PR they are intentionally skipped. Allow the
          # skip instead of treating it as a failure. On the weekly `schedule`
          # run they all execute, so nothing here is permanently unchecked.
          allowed-skips:
            tests-unxt-api, tests-unxt-hypothesis, tests-unxts-api,
            tests-unxts-hypothesis, tests-unxts-interop-gala,
            tests-unxts-interop-matplotlib, tests-unxts-interop-xarray,
            tests-unxts-linalg, tests-unxts-parametric
