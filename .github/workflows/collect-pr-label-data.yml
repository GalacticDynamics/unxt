name: Collect PR labels

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Collect PR label input
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed("This workflow only supports pull_request events.");
              return;
            }
            const prHeadSha = pr.head.sha;
            if (typeof prHeadSha !== "string" || prHeadSha.length === 0) {
              core.setFailed("Missing PR head SHA.");
              return;
            }

            const payload = {
              pr_number: pr.number,
              head_sha: prHeadSha,
              run_sha: prHeadSha
            };

            fs.writeFileSync(
              "labeler-input.json",
              JSON.stringify(payload),
              { encoding: "utf8" }
            );

      - name: Upload PR label input artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-labeler-input-${{ github.event.pull_request.number }}
          path: labeler-input.json
          retention-days: 3
