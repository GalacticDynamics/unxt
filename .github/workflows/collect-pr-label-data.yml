name: Collect PR labels

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Collect PR label input
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require("fs");
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed("This workflow only supports pull_request events.");
              return;
            }
            const runSha = process.env.GITHUB_SHA;
            if (typeof runSha !== "string" || runSha.length === 0) {
              core.setFailed("Missing workflow run SHA.");
              return;
            }

            const payload = {
              pr_number: pr.number,
              head_sha: pr.head.sha,
              run_sha: runSha
            };

            fs.writeFileSync(
              "labeler-input.json",
              JSON.stringify(payload),
              { encoding: "utf8" }
            );

      - name: Upload PR label input artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pr-labeler-input-${{ github.event.pull_request.number }}
          path: labeler-input.json
          retention-days: 3
