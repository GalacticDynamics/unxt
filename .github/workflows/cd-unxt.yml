name: CD - unxt

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "unxt-v*" # Package-specific tags (unxt-vX.Y.Z)
    paths:
      - "src/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/cd-unxt.yml"
  workflow_run:
    workflows:
      - "Create Package Tags"
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_COLOR: 3

jobs:
  build:
    name: Build & inspect package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Build runs for direct tag pushes or via workflow_run from Create Package Tags
    # (which handles coordinator tag releases)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.5.0
        with:
          # Required for hatch-vcs to determine version from git tags.
          # Can be removed if switching to hardcoded versions.
          fetch-depth: 0
          persist-credentials: false
          # For workflow_run events, checkout the exact commit from upstream workflow
          ref: |
            ${{ github.event_name == 'workflow_run' &&
            github.event.workflow_run.head_sha || github.ref }}

      # For workflow_run events, find and export the package-specific tag
      - name: Find package tag (workflow_run)
        if: github.event_name == 'workflow_run'
        uses: ./.github/actions/find-package-tag
        with:
          tag_glob: unxt-v*
          commit_sha: ${{ github.event.workflow_run.head_sha }}

      - name: Validate git tag (for tagged releases)
        if: |
          startsWith(github.ref, 'refs/tags/') || github.event_name ==
          'workflow_run'
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_VAR: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            TAG="$PACKAGE_TAG"
          else
            TAG="${GITHUB_REF_VAR#refs/tags/}"
          fi
          python scripts/validate_tag.py "$TAG" "unxt"
        shell: bash

      - name: Emit release metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          HEAD_SHA=$(git rev-parse HEAD)

          if [ "$EVENT_NAME" = "workflow_run" ]; then
            TAG="${PACKAGE_TAG:-}"
            TRIGGER_EVENT="push"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            TRIGGER_EVENT="push"
          else
            TAG=""
            TRIGGER_EVENT="${EVENT_NAME}"
          fi

          jq -n \
            --arg package "unxt" \
            --arg package_tag "${TAG}" \
            --arg head_sha "${HEAD_SHA}" \
            --arg trigger_event "${TRIGGER_EVENT}" \
            '{"package": $package, "package_tag": $package_tag, "head_sha": $head_sha, "trigger_event": $trigger_event}' \
            > release-metadata.json

          echo "Release metadata:"
          cat release-metadata.json
        shell: bash

      - uses: hynek/build-and-inspect-python-package@fe0a0fb1925ca263d076ca4f2c13e93a6e92a33e # v2.17.0
        with:
          path: .
          upload-name-suffix: -unxt
          attest-build-provenance-github: false

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-metadata-unxt
          path: release-metadata.json
          retention-days: 7
