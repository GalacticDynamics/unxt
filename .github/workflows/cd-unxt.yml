name: CD - unxt

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/cd-unxt.yml"
  push:
    branches:
      - main
    tags:
      - "unxt-v*" # Package-specific tags (unxt-vX.Y.Z)
    paths:
      - "src/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/cd-unxt.yml"
  workflow_run:
    workflows:
      - "Create Package Tags"
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_COLOR: 3

jobs:
  build:
    name: Build & inspect package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    # Build runs for direct tag pushes or via workflow_run from Create Package Tags
    # (which handles coordinator tag releases)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v5.5.0
        with:
          # Required for hatch-vcs to determine version from git tags.
          # Can be removed if switching to hardcoded versions.
          fetch-depth: 0
          persist-credentials: false
          # For workflow_run events, checkout the exact commit from upstream workflow
          ref: |
            ${{ github.event_name == 'workflow_run' &&
            github.event.workflow_run.head_sha || github.ref }}

      # For workflow_run events, find and export the package-specific tag
      - name: Find package tag (workflow_run)
        if: github.event_name == 'workflow_run'
        uses: ./.github/actions/find-package-tag
        with:
          tag_glob: unxt-v*
          commit_sha: ${{ github.event.workflow_run.head_sha }}

      - name: Validate git tag (for tagged releases)
        if: |
          startsWith(github.ref, 'refs/tags/') || github.event_name ==
          'workflow_run'
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG="$PACKAGE_TAG"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          python scripts/validate_tag.py "$TAG" "unxt"
        shell: bash

      - uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516 # v2.14.0
        with:
          path: .
          upload-name-suffix: -unxt
          attest-build-provenance-github:
            ${{ github.event_name != 'pull_request' }}

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/unxt
    permissions:
      id-token: write
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/unxt-v')) ||
      github.event_name == 'workflow_run'

    steps:
      - name: Download built artifact to dist/
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: Packages-unxt
          path: dist

      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/unxt
    permissions:
      id-token: write
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/unxt-v')) ||
      github.event_name == 'workflow_run'

    steps:
      - name: Download built artifact to dist/
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: Packages-unxt
          path: dist

      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
