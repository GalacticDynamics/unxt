name: CD PR - unxt-api

on:
  pull_request:
    paths:
      - "packages/unxt-api/**"
      - ".github/workflows/cd-unxt-api.yml"
      - ".github/workflows/cd-pr-unxt-api.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 3

permissions:
  contents: read

jobs:
  build:
    name: Build & inspect package (PR)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.5.0
        with:
          # Required for hatch-vcs to determine version from git tags.
          # Can be removed if switching to hardcoded versions.
          fetch-depth: 0
          persist-credentials: false

      - uses: hynek/build-and-inspect-python-package@fe0a0fb1925ca263d076ca4f2c13e93a6e92a33e # v2.17.0
        with:
          path: packages/unxt-api
          upload-name-suffix: -unxt-api
          attest-build-provenance-github: false
