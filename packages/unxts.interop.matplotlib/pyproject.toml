[project]
authors = [
  { name = "GalacticDynamics", email = "nstarman@users.noreply.github.com" },
  { name = "Nathaniel Starkman", email = "nstarman@users.noreply.github.com" },
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Programming Language :: Python",
  "Topic :: Scientific/Engineering",
  "Typing :: Typed",
]
dependencies = ["matplotlib>=3.8", "unxt>=2.0.0", "zeroth>=1.0.0"]
description = "matplotlib integration for unxt (canonical: unxts.interop.matplotlib)"
dynamic = ["version"]
license = "BSD-3-Clause"
name = "unxts.interop.matplotlib"
readme = "README.md"
requires-python = ">=3.11"

[project.urls]
"Bug Tracker" = "https://github.com/GalacticDynamics/unxt/issues"
Homepage      = "https://github.com/GalacticDynamics/unxt"

[build-system]
build-backend = "hatchling.build"
requires      = ["hatch-vcs", "hatchling"]

[dependency-groups]
test = [
  "pytest>=8.4.2",
  "pytest-arraydiff>=0.6.1",
  "pytest-cov>=6.2.1",
  "pytest-env>=1.1.5",
  "pytest-github-actions-annotate-failures>=0.3.0",
  "sybil[pytest]>=9.2.0",
]

[tool.hatch.version]
source = "vcs"

[tool.hatch.version.raw-options]
local_scheme              = "no-local-version"
root                      = "../.."
search_parent_directories = true

[tool.hatch.version.raw-options.scm.git]
describe_command = [
  "git",
  "describe",
  "--dirty",
  "--tags",
  "--long",
  "--match",
  "unxts-interop-matplotlib-v*",
]

[tool.hatch.build.hooks.vcs]
version-file = "src/unxts/interop/matplotlib/_version.py"
version-file-template = """\
version: str = {version!r}
version_tuple: tuple[int, int, int] | tuple[int, int, int, str, str]
version_tuple = {version_tuple!r}
"""

[tool.hatch.build.targets.wheel]
packages = ["src/unxts"]

[tool.uv.sources]
unxt = { workspace = true }
